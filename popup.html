<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TabLedger</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup-body">
    <main class="popup-shell">
      <section class="popup-card">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <div>
            <p class="eyebrow">Structured tab capture</p>
            <h1>TabLedger</h1>
          </div>
        </div>
        <p class="popup-copy">
          Capture open tabs, get AI-generated metadata, then save to your Browsing Library.
        </p>
        <div class="popup-actions">
          <button id="capture-all" class="primary-button">Capture &amp; Review</button>
          <button id="open-dashboard" class="ghost-button">Open Library</button>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
